name: Deploy cPorter

# Self-deploy cPorter to its cPanel host via the Deploy API (docs/SPEC.md §14).
# Configure repo secrets: CPORTER_URL (e.g. https://deploy.domain), CPORTER_TOKEN (an API
# key with the `deploy` scope), CPORTER_PROJECT (target project slug, e.g. `self`).
#
# This is also the template CI any project can copy: build → package .zip → POST to cPorter.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zip, curl, mbstring, dom, pdo_mysql
          tools: composer:v2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install PHP deps (no-dev)
        working-directory: apps/api
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Build artifact (.zip)
        id: artifact
        env:
          CPORTER_VERSION: ${{ github.sha }}
        run: pnpm build:artifact

      - name: Deploy to cPorter
        env:
          CPORTER_URL: ${{ secrets.CPORTER_URL }}
          CPORTER_TOKEN: ${{ secrets.CPORTER_TOKEN }}
          CPORTER_PROJECT: ${{ secrets.CPORTER_PROJECT }}
        run: |
          set -euo pipefail
          echo "Deploying ${{ steps.artifact.outputs.artifact }} (sha256 ${{ steps.artifact.outputs.sha256 }})"
          http_code=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST "${CPORTER_URL}/api/v1/projects/${CPORTER_PROJECT}/deployments" \
            -H "Authorization: Bearer ${CPORTER_TOKEN}" \
            -H "Idempotency-Key: ${{ github.sha }}" \
            -F "artifact=@${{ steps.artifact.outputs.artifact }};type=application/zip" \
            -F "sha256=${{ steps.artifact.outputs.sha256 }}" \
            -F "version=${{ steps.artifact.outputs.version }}")
          echo "HTTP ${http_code}"; cat response.json
          [ "${http_code}" = "202" ] || [ "${http_code}" = "200" ]
