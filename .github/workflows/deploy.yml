name: Deploy cPorter

# Self-deploy cPorter to its cPanel host via the cPorter GitHub Action (docs/SPEC.md §14).
# Configure repo secrets: CPORTER_HOST (e.g. https://cporter.domain) and CPORTER_TOKEN (an
# API key with the `deploy` scope, plus `read` so the action can wait for status).
# The target project slug is set inline below (`project:`).
#
# This is also the template CI any project can copy: build → package .zip → deploy action.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads it from packageManager in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: zip, curl, mbstring, dom, pdo_mysql
          tools: composer:v2

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install PHP deps (no-dev)
        working-directory: apps/api
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Build artifact (.zip)
        id: artifact
        env:
          CPORTER_VERSION: ${{ github.sha }}
        run: pnpm build:artifact

      - name: Deploy to cPorter
        id: deploy
        uses: ngocmy-spaces/cporter/packages/github-action@v1
        with:
          host: ${{ secrets.CPORTER_HOST }}
          token: ${{ secrets.CPORTER_TOKEN }}
          project: cporter
          artifact: ${{ steps.artifact.outputs.artifact }}
          version: ${{ steps.artifact.outputs.version }}

      - name: Deployment summary
        run: |
          echo "Deployed ${{ steps.deploy.outputs.release-version }} \
          (#${{ steps.deploy.outputs.deployment-id }}) — status ${{ steps.deploy.outputs.status }}"
